name: build-paper

on:
  push:
    paths:
      - 'paper/**'
      - 'figures/**'
      - '.github/workflows/build-paper.yml'
  pull_request:
    paths:
      - 'paper/**'
      - 'figures/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX -> PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: impurity-importance.tex
          working_directory: paper

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: impurity-importance-pdf
          path: paper/impurity-importance.pdf

      - name: Attach PDF to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: paper/impurity-importance.pdf
